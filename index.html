<!DOCTYPE html>
<html>
<head>
<title>Java Demo Website</title>
</head>

<body>

<h1>Welcome to My Java Demo Website</h1>

<button onclick="getMessage()">Click Here</button>

<p id="result"></p>

<script>

function getMessage() {

fetch("/api")
.then(response => response.text())
.then(data => {
document.getElementById("result").innerHTML = data;
});

}

</script>

</body>
</html>
